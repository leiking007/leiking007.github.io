{{ define "main" }}
<section class="mx-auto mt-6 max-w-7xl gap-6 px-4 md:px-6">
    {{/* 页面标题区 */}}
    <div class="mb-10 text-center">
        <div class="flex items-center justify-center gap-3 mb-4">
            <div class="w-12 h-12 rounded-2xl bg-tl-primary/10 flex items-center justify-center">
                {{ partial "icons/icon" (dict "path" "common/tags" "className" "text-2xl text-tl-primary" ) }}
            </div>
        </div>
        <h1 class="text-4xl font-bold mb-3 bg-gradient-to-r from-tl-base-content via-tl-primary to-tl-secondary bg-clip-text text-transparent">
            标签
        </h1>
        <p class="text-tl-base-content/60 text-lg">
            共 {{ len .Site.Taxonomies.tags }} 个标签
        </p>
    </div>

    {{/* 标签云 */}}
    <div class="mb-12">
        {{- partial "tags.html" . -}}
    </div>
</section>
{{ end }}
